<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Leaderboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-block">
        <h1>Provider Leaderboard</h1>
        <p class="subtitle" id="period-label">Month to Date</p>
      </div>
      <div class="updated-block">
        <span class="updated-label">Last updated</span>
        <span class="updated-value" id="last-updated">—</span>
      </div>
    </div>
    <!-- Top-level view switch -->
    <nav class="view-switch" id="view-switch" aria-label="Dashboard views">
      <button class="view-btn active" data-view="brands">Partner Brands</button>
      <button class="view-btn" data-view="providers">Providers</button>
    </nav>
  </header>

  <main class="container">
    <!-- Provider type sub-tabs (only shown in Providers view) -->
    <section class="subtabs" id="provider-subtabs" hidden></section>

    <!-- KPI summary cards -->
    <section class="kpi-grid" id="kpi-grid" aria-label="Summary metrics"></section>

    <!-- Controls -->
    <section class="controls">
      <div class="filter-group" id="region-filters" role="group" aria-label="Region filter"></div>
      <div class="search-wrap">
        <input type="search" id="search" placeholder="Search…" autocomplete="off" />
      </div>
    </section>

    <!-- Ranking chart -->
    <section class="card chart-card">
      <div class="card-head">
        <h2 id="chart-title">Revenue by Provider</h2>
        <span class="card-hint" id="chart-hint">Ranked, current period</span>
      </div>
      <div class="chart-holder">
        <canvas id="revenue-chart"></canvas>
      </div>
    </section>

    <!-- Leaderboard table -->
    <section class="card">
      <div class="card-head">
        <h2 id="table-title">Detailed Leaderboard</h2>
        <span class="card-hint">Click a column header to sort</span>
      </div>
      <div class="table-scroll">
        <table id="leaderboard">
          <thead id="leaderboard-head"></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </section>

    <p class="footnote" id="footnote"></p>
  </main>

  <div id="error-banner" class="error-banner" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
