<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=4" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title-block">
        <div class="mv-title">
          <span class="mv-alpha">ALPHA</span>
          <span class="mv-leader">LEADERBOARD</span>
        </div>
        <div class="mv-rule"></div>
        <div class="mv-sub" id="period-label">YTD 2026</div>
      </div>
      <div class="updated-block">
        <span class="updated-label">Last updated</span>
        <span class="updated-value" id="last-updated">—</span>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="view-switch" id="view-switch" aria-label="Dashboard views">
      <button class="view-btn active" data-view="brands">Partner Brands</button>
      <button class="view-btn" data-view="providers">Providers</button>
    </nav>

    <section class="segment-switch" id="segment-switch" role="group" aria-label="Time period"></section>
    <section class="subtabs" id="provider-subtabs" hidden></section>

    <!-- Top 3 summary (providers only) -->
    <section class="summary" id="provider-summary" hidden></section>

    <section class="kpi-grid" id="kpi-grid" aria-label="Summary metrics"></section>

    <section class="controls">
      <div class="controls-left">
        <div class="filter-group" id="region-filters" role="group" aria-label="Region filter"></div>
        <label class="switch-wrap" id="partner-toggle-wrap" hidden>
          <input type="checkbox" id="partner-toggle" checked />
          <span class="switch-track"><span class="switch-thumb"></span></span>
          <span class="switch-label">Include partners</span>
        </label>
      </div>
      <div class="search-wrap">
        <input type="search" id="search" placeholder="Search…" autocomplete="off" />
      </div>
    </section>

    <section class="card chart-card">
      <div class="card-head">
        <h2 id="chart-title">Revenue by Partner Brand</h2>
        <span class="card-hint" id="chart-hint">Ranked</span>
      </div>
      <div class="chart-holder"><canvas id="revenue-chart"></canvas></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2 id="table-title">Detailed Leaderboard</h2>
        <span class="card-hint">Click a column header to sort</span>
      </div>
      <div class="table-scroll">
        <table id="leaderboard">
          <thead id="leaderboard-head"></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </section>

    <p class="footnote" id="footnote"></p>
  </main>

  <div id="error-banner" class="error-banner" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
